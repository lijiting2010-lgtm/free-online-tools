<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>密码生成器 - 在线强密码生成器</title>
<meta name="description" content="在线密码生成器，生成高强度随机密码，保护账户安全">
<meta name="keywords" content="密码生成,随机密码,强密码生成器,在线工具">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f}
header{background:linear-gradient(135deg,#0071e3,#5856d6);color:white;padding:40px 20px;text-align:center}
header h1{font-size:26px}
.container{max-width:700px;margin:0 auto;padding:20px}
.tool-box{background:white;border-radius:12px;padding:24px;margin:20px 0;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:13px;color:#86868b;margin-bottom:4px}
.input-group input[type="number"]{width:80px;padding:8px;border:1px solid #d2d2d7;border-radius:6px;font-size:14px}
.btn{background:#0071e3;color:white;border:none;padding:10px 24px;border-radius:8px;font-size:15px;cursor:pointer;margin:4px}
.result{margin-top:16px;padding:20px;background:#f5f5f7;border-radius:8px;font-size:18px;text-align:center;font-family:monospace;word-break:break-all}
.ad-box{background:#e5e5ea;border-radius:8px;padding:40px;text-align:center;color:#86868b;margin:20px 0}
.breadcrumb{padding:10px 20px;background:white;font-size:13px}
.breadcrumb a{color:#0071e3;text-decoration:none}
footer{text-align:center;padding:30px;color:#86868b;font-size:12px}
</style></head>
<body>
<header><h1>密码生成器</h1><p>生成高强度随机密码</p></header>
<div class="breadcrumb"><a href="/">首页</a> › 生成工具 › 密码生成器</div>
<div class="container">
<div class="ad-box">广告位</div>
<div class="tool-box">
<h2>🔧 密码生成器</h2>
<div class="input-group"><label>密码长度</label><input type="number" id="len" value="16" min="4" max="128"></div>
<div class="input-group"><input type="checkbox" id="up" checked><label>大写 A-Z</label></div>
<div class="input-group"><input type="checkbox" id="low" checked><label>小写 a-z</label></div>
<div class="input-group"><input type="checkbox" id="dig" checked><label>数字 0-9</label></div>
<div class="input-group"><input type="checkbox" id="sym" checked><label>符号 !@#$%</label></div>
<button class="btn" onclick="gen()">生成</button>
<button class="btn" style="background:#e5e5ea;color:#1d1d1f" onclick="cpy()">复制</button>
<div class="result" id="r">点击生成</div>
</div>
<div class="ad-box">广告位</div>
</div>
<footer><p>© 2026 在线工具集</p></footer>
<script>
function gen(){const l=parseInt(document.getElementById("len").value)||16;let c="";if(document.getElementById("up").checked)c+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";if(document.getElementById("low").checked)c+="abcdefghijklmnopqrstuvwxyz";if(document.getElementById("dig").checked)c+="0123456789";if(document.getElementById("sym").checked)c+="!@#$%^&*()_+-=[]{}|;:,.<>?";if(!c){alert("选一个");return}let p="";for(let i=0;i<l;i++)p+=c[Math.floor(Math.random()*c.length)];document.getElementById("r").textContent=p}
function cpy(){const t=document.getElementById("r").textContent;if(t&&t!="点击生成"){navigator.clipboard.writeText(t).then(()=>alert("已复制!"))}}
gen();
</script></body></html>
