<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免费在线Markdown编辑器 - 实时预览</title>
<meta name="description" content="免费在线Markdown编辑器，支持实时预览、代码高亮、表格、图片等功能。无需注册，即开即用。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;padding:20px;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.container{max-width:1200px;margin:0 auto}
.header{text-align:center;padding:20px;color:#e0e0ff}
.header h1{font-size:26px;margin-bottom:8px}
.header p{opacity:.7;font-size:14px}
.editor-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
@media(max-width:768px){.editor-wrap{grid-template-columns:1fr}}
.panel{background:#16213e;border-radius:12px;overflow:hidden}
.panel-title{padding:12px 16px;background:#0f3460;color:#e0e0ff;font-size:13px;font-weight:600}
textarea{width:100%;height:500px;padding:16px;border:none;background:#16213e;color:#e0e0ff;font-size:14px;font-family:'Courier New',monospace;line-height:1.6;resize:vertical;outline:none}
#preview{padding:16px;height:500px;overflow-y:auto;color:#e0e0ff;font-size:14px;line-height:1.8}
#preview h1{font-size:24px;margin:16px 0 8px;border-bottom:1px solid #333;padding-bottom:8px}
#preview h2{font-size:20px;margin:14px 0 6px}
#preview h3{font-size:17px;margin:12px 0 4px}
#preview p{margin:8px 0}
#preview pre{background:#0f3460;padding:12px;border-radius:8px;overflow-x:auto;margin:10px 0}
#preview code{font-family:'Courier New',monospace;font-size:13px}
#preview blockquote{border-left:3px solid #e94560;padding:8px 16px;margin:10px 0;background:rgba(233,69,96,.1);border-radius:0 8px 8px 0}
#preview table{border-collapse:collapse;width:100%;margin:10px 0}
#preview th,#preview td{border:1px solid #333;padding:8px 12px;text-align:left}
#preview th{background:#0f3460}
#preview ul,#preview ol{padding-left:24px;margin:8px 0}
#preview img{max-width:100%;border-radius:8px}
.footer{text-align:center;padding:15px;color:#666;font-size:12px;margin-top:20px}
.actions{display:flex;gap:10px;padding:10px 16px}
.actions button{padding:6px 14px;border:none;border-radius:6px;background:#e94560;color:#fff;cursor:pointer;font-size:12px}
.actions button:hover{opacity:.8}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>📝 Markdown 编辑器</h1><p>在线编辑 · 实时预览 · 一键复制</p></div>
<div class="editor-wrap">
<div class="panel">
<div class="panel-title">✏️ 编辑区</div>
<div class="actions">
<button onclick="loadSample()">📄 示例</button>
<button onclick="clearAll()">🗑️ 清空</button>
</div>
<textarea id="editor"># 欢迎使用Markdown编辑器

## 实时预览

输入 **Markdown** 语法，右侧实时预览效果。

### 支持的功能

- **粗体** 和 *斜体*
- `行内代码`
- 有序列表和无序列表
- [链接](https://example.com)
- 表格

### 代码块示例

```python
def hello():
    print("Hello, Markdown!")
```

### 表格示例

| 功能 | 支持情况 |
|------|---------|
| 标题 | ✅ |
| 列表 | ✅ |
| 代码块 | ✅ |
| 表格 | ✅ |

> 💡 提示：这是一个纯前端Markdown编辑器，内容不会上传到服务器。
</textarea>
</div>
<div class="panel">
<div class="panel-title">👁️ 预览</div>
<div id="preview"></div>
</div>
</div>
<div class="footer">免费在线Markdown编辑器 · 无需注册 · 数据不上传服务器</div>
</div>
<script>
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
function render(){
let md=editor.value;
let html=md
.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
.replace(/^### (.+)$/gm,'<h3>$1</h3>')
.replace(/^## (.+)$/gm,'<h2>$1</h2>')
.replace(/^# (.+)$/gm,'<h1>$1</h1>')
.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
.replace(/\*(.+?)\*/g,'<em>$1</em>')
.replace(/`([^`]+)`/g,'<code>$1</code>')
.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
.replace(/^- (.+)$/gm,'<li>$1</li>')
.replace(/\n\n/g,'</p><p>')
.replace(/\n/g,'<br>');
// 简单处理代码块
html=html.replace(/```[^]*?```/g,function(m){return '<pre><code>'+m.replace(/```\w*/g,'').trim()+'</code></pre>';});
// 处理表格
html=html.replace(/\|(.+)\|/g,function(m){const cells=m.split('|').filter(c=>c.trim());return'<tr><td>'+cells.join('</td><td>')+'</td></tr>';});
preview.innerHTML='<p>'+html+'</p>';
}
function loadSample(){editor.value='# Markdown 示例\n\n## 二级标题\n\n这是一段**加粗**文字和*斜体*文字。\n\n### 列表\n\n- 项目一\n- 项目二\n- 项目三\n\n### 代码\n\n`console.log("Hello")`\n\n> 这是一段引用文字';render();}
function clearAll(){editor.value='';render();}
editor.addEventListener('input',render);
render();
</script>
</body>
</html>
